services:
  turing-orchestrator:
    build:
      context: ..
      dockerfile: orchestrator/Dockerfile
    env_file: ../.env
    ports:
      - "${ORCHESTRATOR_PUBLIC_PORT:-3000}:3000"
    expose:
      - "3001"
    volumes:
      - ../data:/app/data
    networks:
      - net-system
      - net-files

  turing-agent-runtime-general:
    build:
      context: ..
      dockerfile: agent-runtime/Dockerfile
    environment:
      TURING_INTERNAL_TOKEN: ${TURING_INTERNAL_TOKEN}
      MCP_SYSTEM_TOKEN_GENERAL: ${MCP_SYSTEM_TOKEN_GENERAL}
      MCP_FILES_TOKEN_GENERAL: ${MCP_FILES_TOKEN_GENERAL}
      ORCHESTRATOR_INTERNAL_BASE_URL: ${ORCHESTRATOR_INTERNAL_BASE_URL:-http://turing-orchestrator:3001/internal}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_PRETTY: ${LOG_PRETTY}
    depends_on:
      - turing-orchestrator
      - turing-mcp-system
      - turing-mcp-files
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - net-system
      - net-files

  turing-mcp-system:
    build: ../mcp-system
    environment:
      MCP_SYSTEM_TOKEN_GENERAL: ${MCP_SYSTEM_TOKEN_GENERAL}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_PRETTY: ${LOG_PRETTY}
    expose:
      - "7100"
    networks:
      - net-system

  turing-mcp-files:
    build: ../mcp-files
    environment:
      MCP_FILES_TOKEN_GENERAL: ${MCP_FILES_TOKEN_GENERAL}
      TURING_APPROVAL_JWT_SECRET: ${TURING_APPROVAL_JWT_SECRET}
      TURING_INTERNAL_TOKEN: ${TURING_INTERNAL_TOKEN}
      ORCHESTRATOR_INTERNAL_BASE_URL: ${ORCHESTRATOR_INTERNAL_BASE_URL:-http://turing-orchestrator:3001/internal}
      FILES_SANDBOX_ROOT: ${FILES_SANDBOX_ROOT}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_PRETTY: ${LOG_PRETTY}
    expose:
      - "7110"
    volumes:
      - ../sandbox:/sandbox
    networks:
      - net-files

networks:
  net-system:
  net-files:
