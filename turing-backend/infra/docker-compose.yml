services:
  turing-orchestrator:
    build:
      context: ../..
      dockerfile: turing-backend/orchestrator-go/Dockerfile
    env_file: ../.env
    ports:
      - "${ORCHESTRATOR_PUBLIC_PORT:-3000}:3000"
    expose:
      - "3001"
    volumes:
      - ../data:/app/data
    networks:
      - net-system
      - net-files

  turing-agent-runtime-general:
    build:
      context: ../..
      dockerfile: turing-backend/agent-runtime-go/Dockerfile
    environment:
      TURING_INTERNAL_TOKEN: ${TURING_INTERNAL_TOKEN}
      ORCHESTRATOR_GRPC_ADDR: ${ORCHESTRATOR_GRPC_ADDR:-turing-orchestrator:3001}
      TURING_WORKER_ID: ${TURING_WORKER_ID:-worker-general-go}
      TURING_MAX_CONCURRENT_RUNS_GENERAL: ${TURING_MAX_CONCURRENT_RUNS_GENERAL:-1}
      TURING_MAX_TOOL_CALLS_PER_RUN: ${TURING_MAX_TOOL_CALLS_PER_RUN:-10}
      TURING_MODEL_TIMEOUT_MS: ${TURING_MODEL_TIMEOUT_MS:-120000}
      TURING_TOOL_TIMEOUT_MS: ${TURING_TOOL_TIMEOUT_MS:-30000}
      MCP_SYSTEM_BASE_URL: ${MCP_SYSTEM_BASE_URL:-http://turing-mcp-system:7100/mcp}
      MCP_FILES_BASE_URL: ${MCP_FILES_BASE_URL:-http://turing-mcp-files:7110/mcp}
      MCP_SYSTEM_TOKEN_GENERAL: ${MCP_SYSTEM_TOKEN_GENERAL}
      MCP_FILES_TOKEN_GENERAL: ${MCP_FILES_TOKEN_GENERAL}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      - turing-orchestrator
      - turing-mcp-system
      - turing-mcp-files
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - net-system
      - net-files

  turing-mcp-system:
    build: ../mcp-system
    environment:
      MCP_SYSTEM_TOKEN_GENERAL: ${MCP_SYSTEM_TOKEN_GENERAL}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_PRETTY: ${LOG_PRETTY:-false}
    expose:
      - "7100"
    networks:
      - net-system

  turing-mcp-files:
    build: ../mcp-files
    environment:
      MCP_FILES_TOKEN_GENERAL: ${MCP_FILES_TOKEN_GENERAL}
      TURING_APPROVAL_JWT_SECRET: ${TURING_APPROVAL_JWT_SECRET}
      TURING_INTERNAL_TOKEN: ${TURING_INTERNAL_TOKEN}
      ORCHESTRATOR_INTERNAL_BASE_URL: ${ORCHESTRATOR_INTERNAL_BASE_URL:-http://turing-orchestrator:3001/internal}
      FILES_SANDBOX_ROOT: ${FILES_SANDBOX_ROOT:-/sandbox}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_PRETTY: ${LOG_PRETTY:-false}
    expose:
      - "7110"
    volumes:
      - ../sandbox:/sandbox
    networks:
      - net-files

networks:
  net-system:
  net-files:
