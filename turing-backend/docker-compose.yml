version: '3.8'

services:
  # -------------------------------------------------------
  # 1. THE BRAIN: Orchestrator (TypeScript + Fastify)
  # -------------------------------------------------------
  turing-core:
    build: ./orchestrator
    container_name: turing-core
    restart: always
    # Expose port 3000 so your Flutter Client can reach it
    # (Tailscale on your Mac Mini will pick this up automatically)
    ports:
      - "3000:3000"
    depends_on:
      - google-mcp
    environment:
      # 1. Tell the Brain where the Tools are (Internal Docker DNS)
      - MCP_SERVERS=http://google-mcp:8080/sse
      
      # 2. Tell the Brain where Ollama is (On your Mac Host)
      - OLLAMA_HOST=http://host.docker.internal:11434
      
    # This allows the container to talk to "localhost" on your Mac Mini
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # -------------------------------------------------------
  # 2. THE TOOL: Google MCP (Go)
  # -------------------------------------------------------
  google-mcp:
    build: ./services/google-mcp
    container_name: turing-google
    restart: always
    # Internal usage only - the Internet cannot see this directly
    expose:
      - "8080"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}