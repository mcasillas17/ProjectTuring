name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  go:
    name: Go tests and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true

      - name: Run Go tests
        run: go test ./... -count=1

      - name: Build Go packages
        run: go build ./...

  mcp-files:
    name: MCP files module
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true
          cache-dependency-path: |
            go.sum
            turing-backend/mcp-files/go.sum

      - name: Test MCP files module
        run: |
          cd turing-backend/mcp-files
          go test ./... -count=1

      - name: Build MCP files server
        run: |
          cd turing-backend/mcp-files
          go build ./cmd/server

  proto-and-scripts:
    name: Proto and script checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true

      - name: Set up protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "34.1"

      - name: Install Go protobuf plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Check generated protobuf output
        run: tools/proto/check.sh

      - name: Check shell scripts
        run: bash -n turing-backend/scripts/init.sh turing-backend/scripts/reset.sh turing-backend/scripts/smoke-grpc.sh

      - name: Check workflow coverage
        run: go test ./.github/workflows

  flutter:
    name: Flutter tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: turing-client/turing_app
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Run Flutter tests
        run: flutter test
